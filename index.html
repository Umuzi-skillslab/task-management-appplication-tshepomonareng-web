<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Task Management System</h1>

        <div class="add-task-section">
            <h2>Add New Task</h2>
            <input type="text" id="title" placeholder="Task Title">
            <input type="text" id="description" placeholder="Description">
            <select id="priority">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
            <button class="add-task-btn" type="button">Add Task</button>
        </div>

        <div class="task-list" id="task-list">
            <!-- Tasks will be displayed here -->
        </div>

        <div class="statistics">
            <p>0 of 0 tasks completed</p>
        </div>
    </div>

    <!-- Fix: single module entry point. dom.js imports app.js and utils.js itself,
         so the browser only needs to load one script, in the correct dependency order. -->
    <script type="module" src="src/dom.js"></script>
</body>
</html>
